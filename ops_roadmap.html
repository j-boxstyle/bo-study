<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Business Operations 全体ロードマップ — De Gouden Wafel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; background: #0a0e1a; color: #e8eef7; line-height: 1.6; }

/* ============ HEADER ============ */
header.hero {
  background: linear-gradient(135deg, #d4a574 0%, #8b5a2b 100%);
  padding: 32px 40px; color: #fff; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
header h1 { font-size: 28px; margin-bottom: 6px; }
header .sub { font-size: 14px; opacity: 0.9; }
.company-box {
  background: rgba(255,255,255,0.15); padding: 14px 18px; border-radius: 10px;
  margin-top: 14px; font-size: 13px; backdrop-filter: blur(4px);
}
.company-box b { color: #ffe8b8; }

/* ============ CONTROLS ============ */
.controls {
  position: sticky; top: 168px; z-index: 40;
  background: #0f1726; padding: 12px 40px; border-bottom: 1px solid #243047;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.controls input {
  background: #1a2438; color: #fff; border: 1px solid #2d3a55;
  padding: 8px 14px; border-radius: 8px; font-size: 14px; width: 260px;
}
.controls input:focus { outline: none; border-color: #6ab0ff; }
.legend { display: flex; gap: 10px; font-size: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.filter-btn {
  background: #1a2438; color: #aab8d0; border: 1px solid #2d3a55;
  padding: 6px 14px; border-radius: 18px; cursor: pointer; font-size: 12px;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background: #2a4373; color: #fff; border-color: #4a7dd9; }

/* ============ SIMPLE TREE ============ */
.roadmap { padding: 24px 32px 80px; max-width: none; margin: 0; }
.rooms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap: 20px;
  align-items: start;
}

.room {
  margin-bottom: 48px;
  background: #131b2d;
  border-radius: 14px;
  border-left: 6px solid;
  padding: 26px 30px;
}
.room-head {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 18px; margin-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.room-head .icn { font-size: 42px; }
.room-head .nm { font-size: 32px; font-weight: 700; }
.room-head .jp { font-size: 18px; color: #aab8d0; margin-left: 8px; }

/* ===== Family tree lines ===== */
.branches {
  padding-left: 28px;
  margin-left: 14px;
}

.branch {
  position: relative;
  padding-top: 10px;
}

/* Horizontal tick connecting from vertical line to the node */
.branch::before {
  content: "";
  position: absolute;
  left: -28px;
  top: 28px;   /* roughly vertical center of the node label */
  width: 28px;
  height: 2px;
  background: var(--line-color, #4a7dd9);
}

/* Vertical line going through siblings */
.branch::after {
  content: "";
  position: absolute;
  left: -28px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--line-color, #4a7dd9);
}

/* Last sibling: cap the vertical at the tick */
.branch:last-child::after {
  height: 28px;
}

/* ===== Nodes (labels at each level) ===== */
.node {
  display: inline-block;
}

.sub-node {
  font-size: 22px; color: #ffd66a; font-weight: 700;
  padding: 8px 0;
}

.subsub-node {
  font-size: 19px; color: #6ab0ff; font-weight: 600;
  padding: 6px 0;
}

.leaf {
  display: inline-block;
  padding: 10px 18px;
  font-size: 19px; color: #e8eef7;
  background: #1a2438;
  border: 1px solid #2d3a55;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}
.leaf:hover {
  background: #2a4373; border-color: #6ab0ff;
  color: #fff;
}
/* Parent leaf (has children/parts) - emphasized */
.leaf.parent {
  background: #232f4d;
  border-color: #4a7dd9;
  font-weight: 700;
}
.leaf.parent::after {
  content: " ▾"; color: #6ab0ff; font-size: 14px;
}
/* Child part leaf - smaller, dimmer */
.leaf.part {
  background: transparent;
  border: 1px dashed #3d4a68;
  font-size: 17px; font-weight: 400;
  color: #c4d0e6;
  padding: 8px 14px;
}
.leaf.part:hover {
  background: #1a2438; border-style: solid;
}

/* Modal: parts list */
.parts-list { list-style: none; padding-left: 0; }
.parts-list li {
  padding: 10px 14px; margin-bottom: 6px;
  background: #0f1626; border-radius: 8px;
  border-left: 3px solid #6ab0ff;
  font-size: 16px;
}
.parts-list li b { color: #ffd66a; font-size: 17px; }
.concept-card .c-name { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; }
.concept-card .c-hint { font-size: 11px; color: #8aa0c4; margin-top: 2px; }
.concept-card.has-formula::after {
  content: "ƒ"; position: absolute; top: 8px; right: 10px;
  background: #d9b94a; color: #1a1a1a; width: 18px; height: 18px;
  border-radius: 50%; font-size: 11px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
}
.concept-card.compare::before {
  content: "⇄"; position: absolute; top: 8px; right: 10px;
  color: #d97a4a; font-size: 14px; font-weight: bold;
}
.concept-card.has-formula.compare::after { right: 28px; }

/* connection markers */
.connect-row {
  display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;
}
.connect-pill {
  font-size: 9px; padding: 2px 6px; background: #243047;
  border-radius: 10px; color: #aab8d0;
}

/* ============ MODAL ============ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: none; align-items: center; justify-content: center; z-index: 100;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: #131b2d; border-radius: 14px; max-width: 900px; width: 100%;
  max-height: 92vh; overflow-y: auto; border: 1px solid #2d3a55;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal-header {
  padding: 26px 32px; border-bottom: 1px solid #243047;
  display: flex; justify-content: space-between; align-items: start;
  position: sticky; top: 0; background: #131b2d; z-index: 2;
}
.modal-title { font-size: 28px; font-weight: 700; color: #fff; }
.modal-meta { font-size: 15px; color: #8aa0c4; margin-top: 6px; }
.close-btn {
  background: #2d3a55; border: none; color: #fff; width: 40px; height: 40px;
  border-radius: 50%; cursor: pointer; font-size: 22px;
}
.modal-body { padding: 26px 32px; }
.modal-section { margin-bottom: 28px; }
.modal-section h3 {
  font-size: 16px; color: #ffd66a; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.modal-section p, .modal-section li { font-size: 17px; color: #d4ddee; line-height: 1.7; }
.modal-section ul { padding-left: 24px; }
.modal-section li { margin-bottom: 8px; }

.example-box {
  background: linear-gradient(135deg, #2a1d10 0%, #3a2a18 100%);
  border-left: 5px solid #d4a574; padding: 18px 22px; border-radius: 10px;
  font-size: 17px; color: #ffe8b8; line-height: 1.7;
}
.example-box b { color: #fff; }

.formula-box {
  background: #0a1220; border: 1px solid #4a7dd9; padding: 20px 22px;
  border-radius: 10px; font-family: "Courier New", monospace; font-size: 20px;
  color: #6ab0ff; text-align: center; line-height: 2;
}
.formula-box .note { font-size: 14px; color: #8aa0c4; font-family: -apple-system, sans-serif; }

.memo-box {
  background: #1a2438; border-left: 5px solid #d9b94a;
  padding: 16px 22px; border-radius: 10px;
}
.memo-box ul { margin-top: 6px; }
.memo-box li { font-size: 16px; }

.compare-table {
  width: 100%; border-collapse: collapse; font-size: 16px;
  background: #0f1726; border-radius: 10px; overflow: hidden;
}
.compare-table th, .compare-table td {
  padding: 14px 16px; border: 1px solid #243047; text-align: left;
}
.compare-table th { background: #1a2438; color: #ffd66a; font-weight: 600; }

.related-row { display: flex; gap: 10px; flex-wrap: wrap; }
.related-chip {
  background: #2a4373; color: #cce0ff; padding: 8px 14px; border-radius: 16px;
  font-size: 15px; cursor: pointer; border: 1px solid transparent;
}
.related-chip:hover { border-color: #6ab0ff; }

/* mini flow */
.mini-flow {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  padding: 16px; background: #0f1726; border-radius: 10px;
}
.mini-flow .node {
  background: #2a4373; padding: 10px 16px; border-radius: 8px;
  font-size: 15px; color: #fff;
}
.mini-flow .arrow { color: #6ab0ff; font-size: 22px; }

/* ====== TABLET / SMALL DESKTOP ====== */
@media (max-width: 900px) {
  .rooms-grid { grid-template-columns: 1fr; gap: 14px; }
  .roadmap { padding: 14px; }
  .room { padding: 18px 16px; border-left-width: 4px; }
  .room-head .nm { font-size: 24px; }
  .room-head .icn { font-size: 30px; }
  .room-head .jp { font-size: 13px; }
}

/* ====== MOBILE (iPhone等) ====== */
@media (max-width: 600px) {
  /* ヘッダー圧縮 */
  header.hero { padding: 16px; }
  header.hero h1 { font-size: 20px; }
  header.hero .sub { font-size: 11px; }
  .company-box { font-size: 11px; padding: 10px 12px; line-height: 1.5; }

  /* コントロール圧縮 */
  .controls { padding: 8px 12px; top: 0; }
  .controls input { width: 100%; font-size: 13px; padding: 6px 10px; }
  .filter-btn { font-size: 11px; padding: 5px 10px; }
  .legend { display: none; }

  /* ロードマップ余白圧縮 */
  .roadmap { padding: 10px 8px 60px; }
  .rooms-grid { gap: 12px; }

  /* 部屋圧縮 */
  .room { padding: 14px 10px; margin-bottom: 16px; border-radius: 10px; border-left-width: 3px; }
  .room-head { gap: 8px; padding-bottom: 10px; margin-bottom: 6px; }
  .room-head .icn { font-size: 22px; }
  .room-head .nm { font-size: 18px; line-height: 1.2; }
  .room-head .jp { font-size: 11px; display: block; margin: 4px 0 0; }

  /* 家系図の枝（インデント圧縮） */
  .branches { padding-left: 14px; margin-left: 6px; }
  .branch { padding-top: 6px; }
  .branch::before { left: -14px; top: 18px; width: 14px; }
  .branch::after { left: -14px; }
  .branch:last-child::after { height: 18px; }

  /* ノード文字圧縮 */
  .sub-node { font-size: 14px; padding: 4px 0; }
  .subsub-node { font-size: 13px; padding: 3px 0; }
  .leaf { font-size: 13px; padding: 6px 10px; border-radius: 6px; }
  .leaf.part { font-size: 12px; padding: 4px 8px; }
  .leaf.parent::after { font-size: 10px; }

  /* モーダル圧縮 */
  .modal-bg { padding: 8px; }
  .modal { border-radius: 10px; max-height: 95vh; }
  .modal-header { padding: 14px 16px; }
  .modal-title { font-size: 18px; line-height: 1.2; }
  .modal-meta { font-size: 11px; }
  .modal-body { padding: 14px 16px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section h3 { font-size: 13px; }
  .modal-section p, .modal-section li { font-size: 14px; line-height: 1.6; }
  .example-box { font-size: 13px; padding: 10px 12px; }
  .formula-box { font-size: 15px; padding: 12px 14px; }
  .memo-box li { font-size: 13px; }
  .compare-table { font-size: 12px; }
  .compare-table th, .compare-table td { padding: 8px 10px; }
  .related-chip { font-size: 12px; padding: 5px 10px; }
  .parts-list li { font-size: 13px; padding: 8px 10px; }
  .parts-list li b { font-size: 14px; }
  .close-btn { width: 32px; height: 32px; font-size: 18px; }
}

/* ====== 超小画面（iPhone SE等） ====== */
@media (max-width: 380px) {
  .room-head .nm { font-size: 16px; }
  .sub-node { font-size: 13px; }
  .leaf { font-size: 12px; padding: 5px 8px; }
  .leaf.part { font-size: 11px; padding: 3px 6px; }
  .branches { padding-left: 10px; margin-left: 4px; }
  .branch::before { left: -10px; width: 10px; }
  .branch::after { left: -10px; }
}
</style>
</head>
<body>

<header class="hero">
  <h1>🏠 Business Operations の家</h1>
  <div class="sub">Week を越えて 6つの大きな部屋に統合 / 全92概念をひとつの会社で繋ぐ</div>
  <div class="company-box">
    <b>👑 ケース企業：De Gouden Wafel B.V.（アムステルダム）</b><br>
    オランダのストロープワッフルメーカー。アムステルダム工場 + 3つの直営カフェ + オンラインショップ + 輸出（日本・米国）。
    上流：小麦粉ミル／砂糖サプライヤー／フリースラントのバター。
    下流：直販／Albert Heijn／海外卸。
    工程：<i>混合→寝かせ→焼成→カット→キャラメル充填→冷却→包装→出荷</i>。
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 概念を検索（例：EOQ, Little, Lean...）">
  <button class="filter-btn active" data-dom="all">全部屋</button>
  <button class="filter-btn" data-dom="strategy">🎯 戦略</button>
  <button class="filter-btn" data-dom="design">🏗️ 設計</button>
  <button class="filter-btn" data-dom="planning">📅 計画・管理</button>
  <button class="filter-btn" data-dom="inventory">📦 在庫</button>
  <button class="filter-btn" data-dom="lean">⚡ 改善（Lean）</button>
  <button class="filter-btn" data-dom="quality">✅ 品質・信頼性</button>
  <div class="legend" style="margin-left:auto;">
    <div class="legend-item"><span class="legend-dot" style="background:#d9b94a"></span>計算/公式</div>
    <div class="legend-item"><span style="color:#d97a4a;font-weight:bold;">⇄</span>対比</div>
  </div>
</div>

<div class="roadmap" id="roadmap"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<script>
/* ============================================================
   全概念データ — De Gouden Wafel の事例で統一
   ============================================================ */
const CONCEPTS = [
/* ============ WEEK 1 — Ch 1,2,3：オペレーションとは／戦略 ============ */
{id:"w1_om", w:1, ch:"Ch1", group:"What is OM", name:"Operations Management",
 def:"製品・サービスを生産する資源・活動を計画・管理・改善する機能。",
 example:"De Gouden Wafel の OM は『焼成工場 + カフェ運営 + 配送』を統括し、原料→完成品→顧客までの全工程を管理する。",
 memorize:["生産だけでなく『デリバリー』まで含む","会社の最大コスト＆価値の中心","Marketing/Finance/HR と並ぶ3大コア機能の1つ"],
 related:["w1_3core","w1_ito","w1_strategy"]},

{id:"w1_3core", w:1, ch:"Ch1", group:"What is OM", name:"3 Core Functions + Support",
 def:"全企業に共通する3つの中核機能（Operations / Marketing / Product & Service Development）と支援機能（HR, Finance, IT...）。",
 example:"De Gouden Wafel：Operations=焼成・流通、Marketing=Instagram広告・卸営業、Development=季節限定フレーバー開発。HR/経理が支援。",
 memorize:["3つは『どの企業にも必要』","支援機能との境界は会社次第","『機能としての』Operationsと『活動としての』operationsを区別"],
 related:["w1_om","w1_func_act"]},

{id:"w1_ito", w:1, ch:"Ch1", group:"What is OM", name:"Input-Transformation-Output Model",
 def:"全オペレーションは『投入資源→変換プロセス→出力（製品・サービス）』の構造を持つ。",
 example:"De Gouden Wafel：Input=小麦粉・砂糖・労働力・オーブン、Transformation=混合・焼成・充填、Output=ストロープワッフル＋カフェ体験。",
 visual:"flow",
 flow:["Input：小麦粉・砂糖・労働者・オーブン","Transformation：混合→焼成→充填","Output：完成品＋顧客体験"],
 memorize:["『変換』が中核","Inputには Transformed と Transforming の2種","Outputは Goods/Services の混合体"],
 related:["w1_tformed","w1_tforming","w1_pvs"]},

{id:"w1_tformed", w:1, ch:"Ch1", group:"What is OM", name:"Transformed Resources",
 def:"変換される側の資源。Materials（材料）/ Information（情報）/ Customers（顧客）の3種。",
 example:"De Gouden Wafel：Materials=小麦粉・砂糖（工場）、Information=オンライン注文データ、Customers=カフェ来店客。",
 memorize:["M-I-C の3分類","ほとんどの operation は混合だが『支配的な1つ』がある","Wafel工場=Materials支配、カフェ=Customers支配"],
 compare:true,
 related:["w1_tforming","w1_ito","w1_4vs"]},

{id:"w1_tforming", w:1, ch:"Ch1", group:"What is OM", name:"Transforming Resources",
 def:"変換する側の資源。Facilities（建物・設備）と Staff（人材）の2種。",
 example:"De Gouden Wafel：Facilities=焼成オーブン・冷蔵庫・カフェ店舗、Staff=ベイカー・バリスタ・営業担当。",
 memorize:["F-S の2分類","StaffはTransformedにもなり得る（訓練を受ける時）","設備の自動化度合いが Process type に影響"],
 compare:true,
 related:["w1_tformed","w2_proc_types_m"]},

{id:"w1_pvs", w:1, ch:"Ch1", group:"What is OM", name:"Products vs Services",
 def:"Tangibility・Storability・Transportability・Simultaneity・Customer contact の5軸で違う。実際はほとんど『混合』。",
 example:"De Gouden Wafel：箱詰めワッフル＝Products寄り（保管可能・輸送可能）。カフェの焼きたて体験＝Services寄り（同時性・顧客接触）。",
 compare:true,
 cmpTable:[
   ["軸","Products","Services"],
   ["有形性","High","Low"],
   ["保管","可","不可"],
   ["輸送","可","不可（顧客が来る）"],
   ["同時生産消費","No","Yes"],
   ["顧客接触","Low","High"]],
 memorize:["完全な製品も完全なサービスも稀","混合の比率を見極めるのが OM"],
 related:["w1_fb_office","w2_proc_types_s"]},

{id:"w1_fb_office", w:1, ch:"Ch1", group:"What is OM", name:"Front-office vs Back-office",
 def:"顧客接触する『前』部分と、顧客が見ない『後ろ』部分を区別する考え方。",
 example:"De Gouden Wafel：カフェ接客＝front-office、工場の焼成＝back-office、配送センター＝back-office。",
 compare:true,
 memorize:["Front=customer-processing、Back=material/info-processing が中心","効率はBack高め、柔軟性はFront高め","両方の境界を意識して設計する"],
 related:["w1_pvs"]},

{id:"w1_hierarchy", w:1, ch:"Ch1", group:"What is OM", name:"Process Hierarchy",
 def:"Supply Network → Operation → Process → Activity の階層構造。",
 example:"De Gouden Wafel：サプライ網（小麦ミル→工場→AH店舗）⊃ 工場 ⊃ 焼成プロセス ⊃ オーブン投入作業。",
 visual:"flow",
 flow:["Supply Network","Operation（工場全体）","Process（焼成工程）","Activity（投入作業）"],
 memorize:["分析のズーム倍率を選ぶための階層","上位ほどStrategy寄り、下位ほどOperational"],
 related:["w2_network"]},

{id:"w1_4vs", w:1, ch:"Ch1", group:"What is OM", name:"Four Vs (Volume・Variety・Variation・Visibility)",
 def:"オペレーションの4特性。Vol↑・Var↓・Variation↓・Vis↓ ⇒ 低コスト型へ。",
 example:"De Gouden Wafel工場：Vol高・Var低（標準品）・Variation低・Vis低 → 低コスト大量生産。直営カフェ：Vol低・Var高・Variation高・Vis高 → 高単価サービス。",
 visual:"compare",
 cmpTable:[
   ["V","High Vol例","Low Vol例"],
   ["Volume","工場焼成","カフェ焼きたて"],
   ["Variety","ノーマル味のみ","季節フレーバー10種"],
   ["Variation","通年安定","週末・クリスマス急増"],
   ["Visibility","顧客は見えない","顧客の目の前で焼く"]],
 memorize:["4つは独立だが相関しがち","High volume + Low variety + Low variation + Low visibility = 低コスト","逆=柔軟・高品質・高コスト"],
 related:["w2_proc_types_m","w2_proc_types_s","w1_pvs"]},

{id:"w1_func_act", w:1, ch:"Ch1", group:"What is OM", name:"Operations as Function vs Activity",

{id:"w6_hold_order", w:6, ch:"Ch13", group:"Inventory Basics", name:"Holding vs Ordering Costs",

{id:"w6_eoq", w:6, ch:"Ch13", group:"Inventory Basics", name:"EOQ & EBQ",
 def:"Economic Order Quantity：総コスト最小の発注ロット。EBQ=自社生産時の Economic Batch Quantity。",
 example:"De Gouden Wafel小麦粉：D=120,000kg/年、Co=€80、Ch=€0.6/kg → EOQ=√(2×120000×80/0.6)=5,657kg/回。",
 formula:"EOQ = √(2 × D × Co / Ch)<br>EBQ = √(2DCo / Ch(1−d/p))<br>d=需要率、p=生産率",

{id:"w6_safety", w:6, ch:"Ch13", group:"Inventory Basics", name:"Safety Stock & Reorder Level",
 def:"Safety stock=変動吸収。ROL=平均需要×LT+SS。SS=Z×σ×√LT。",
 example:"De Gouden Wafelシロップ：平均D=20kg/日、LT=5日、需要σ=4kg、95%サービス → SS=1.65×4×√5≈15kg、ROL=20×5+15=115kg。",

{id:"w6_pooling", w:6, ch:"Ch14", group:"Inventory Mgmt", name:"Pooling Effect & Two/Three-Bin",

{id:"w6_holding_toyota", w:6, ch:"Ch14", group:"Inventory Mgmt", name:"Holding Cost % & Toyota City",

{id:"w6_newsvendor", w:6, ch:"Ch14", group:"Inventory Mgmt", name:"Newsvendor Model",

 formula:"Cu = 価格 − コスト（不足の損失）<br>Co = コスト − 残価（過剰の損失）<br>Service level* = Cu / (Cu + Co)<br>Q* = μ + Z(SL) × σ",

 related:["w6_safety","w3_forecast","w3_dm_plan"]},

/* ============ WEEK 7 — Ch 15,16：Lean ============ */
{id:"w7_lean", w:7, ch:"Ch15", group:"Lean Basics", name:"Lean & 7 Wastes (TIMWOOD)",
 def:"Toyota Production System（TPS）に由来する経営思想。『顧客価値を生まない作業＝Muda（無駄）を徹底的に排除する』が核心。5原則：①顧客視点の Value 定義、② Value Stream の可視化、③ Flow（流れ）の確立、④ Pull（後工程からの引き）、⑤ Perfection（完璧追求）。Muda の代表分類が 7 wastes（TIMWOOD）。最も悪いのは Over-production（売れないものを作る）— 在庫・運搬・検査など他のムダを連鎖的に生む元凶。在庫を『水位』に例え、水位を下げると岩（=問題）が見える、というメタファーが有名。",
 example:"De Gouden Wafel工場で発見した7つのムダ：Transport=原料を100m離れた倉庫から運ぶ、Inventory=売れない3か月分のシロップ滞留、Motion=作業者が道具を毎回探す（年間60時間ロス）、Waiting=焼成待ちで充填工程が遊休、Over-production=売れない味を在庫予測で焼成（最悪のムダ）、Over-processing=Albert Heijn 用なのに過剰なギフト包装、Defects=焦げ品の再焼成（人件費+材料費の二重ロス）。",
 visual:"compare",
 cmpTable:[["記号","ムダ","例"],
   ["T","Transport","遠隔倉庫往復"],
   ["I","Inventory","6ヶ月分滞留"],
   ["M","Motion","道具を探す"],
   ["W","Waiting","オーブン空き待ち"],
   ["O","Over-production","売れない量"],
   ["O","Over-processing","過剰梱包"],
   ["D","Defects","焦げ品再焼成"]],
 memorize:["7文字 TIMWOOD","Over-prodが最悪（他を引き起こす）","『価値を生まない作業は全部ムダ』"],
 related:["w7_jit","w7_vsm","w2_thr_eff"]},

{id:"w7_jit", w:7, ch:"Ch15", group:"Lean Basics", name:"JIT, Kanban & Lean Tools",
 def:"JIT（Just-In-Time）=『必要な物を、必要な時に、必要な量だけ』作り届ける思想。Lean の核心メカニズム。Kanban（看板）はその情報伝達道具で、後工程が前工程に『これを補充して』と引く Pull の物理的信号（カード／カンバン）。Lean Tools の全体系には 5S（職場整備）・SMED（段取り短縮）・Poka-Yoke（ミス防止）・Andon（異常停止）・Heijunka（平準化）・Jidoka（自働化）などが含まれる。前提条件：低変動・小ロット・短LT・高品質。これらが揃わないと JIT は機能しない。",
 example:"De Gouden Wafel：シロップタンクが半分になると自動 Kanban信号がサプライヤーへ→2時間以内に補充。在庫は常に2日分のみ。原料の発注書は不要、看板（実物の容器の往復）が信号。直営カフェも同じ：抹茶味の在庫が3個になったら自動でバックヤード焼成開始。需要に同期した呼吸する工場。",
 visual:"flow",
 flow:["顧客需要","→ Kanban信号","→ 後工程の作動","→ 前工程の補充"],
 memorize:["Pull型の代表","JIT+Jidoka=TPSの2本柱","次のLean Houseで全体像"],
 related:["w3_push_pull","w7_lean_house","w7_lean_wip","w6_mrp"]},

{id:"w7_lean_wip", w:7, ch:"Ch15", group:"Lean Basics", name:"Lean & WIP",
 def:"Lean が WIP（仕掛在庫）削減を目指す理由：Little's Law（WIP=TH×T）から、TH 一定なら WIP↓⇒ Throughput Time↓ → Speed↑。さらに WIP が少ないと不良発見が早く、品質も上がる。ただし Kingman の式 Wq ≈ (Ca²+Cs²)/2 × U/(1−U) × Ts より、変動（C²）と稼働率（U）が高いと待ちが指数的に増えるので、WIP を下げるには『変動を抑える』と『稼働率を 100% にしない』ことが前提。これが Heijunka（平準化）と意図的なゆとり保持の理由。",
 example:"De Gouden Wafel焼成ライン：WIP=200箱→100箱に削減すると Throughput Time が 4時間→2時間に短縮（Little's Law）。ただし焼成時間のばらつきが大きいまま WIP を半分にすると、欠品リスク急増。先に SMED で段取り変動を抑え、5S で作業ばらつきを抑え、Jidoka で異常を即発見してから初めて WIP を下げられる。",
 formula:"WIP = Throughput × Throughput Time<br>低WIPを成立させる ⇒ 変動を下げる必要",
 memorize:["WIP↓ → Speed↑","ただしVariability低が前提","Kingmanの式（Variability×Util）に繋がる"],
 related:["w2_throughput","w2_var_util","w7_lean","w3_queuing"]},

{id:"w7_vsm", w:7, ch:"Ch15", group:"Lean Basics", name:"Value Stream Mapping",
 def:"製品が原料→顧客まで届く『物と情報の流れ全体』を1枚に可視化する Lean の最重要ツール。Toyota の手法を Womack & Jones が体系化。各工程ボックスにサイクルタイム・段取り時間・稼働率・WIP・歩留りを記載。工程間は Push（→）か Pull（◯）かで線種を区別。Current State（現状）と Future State（理想）の2枚を作り差分を改善ターゲットに。Value-added Time（顧客が対価を払う加工時間）と Non-value-added Time（待ち・搬送・検査）を分けると、多くの工場で VA は全体の 1〜5% 程度しかなく、残り 95% 超がムダ＝改善余地と判明する。",
 example:"De Gouden Wafel の Current State VSM：原料受入→保管(2日待)→計量(3分)→混合(15分)→寝かせ(60分)→焼成(8分)→冷却(24時間)→包装(2分)→出荷待ち(48時間)。Total Lead Time=4.3日、Value-added=28分 → η ≈ 0.45%。Future State：寝かせ連続化＋強制冷却で Total 8時間／VA 28分 → η ≈ 5.8%（13倍改善）。",
 formula:"η = Value-added Time / Total Lead Time",
 memorize:["Current → Future","Process Mapping の進化版","Lean改善の最重要ツール"],
 related:["w2_proc_map","w2_thr_eff","w7_lean"]},

{id:"w7_batch_flow", w:7, ch:"Ch15", group:"Lean Basics", name:"Batch vs Continuous Flow",
 def:"Batch Flow（バッチ流れ）= 一定ロット数まとめて工程間移動する従来方式。前工程が全部完了するまで後工程は待機する。Continuous Flow / One-Piece Flow（1個流し）= 1単位ずつ次工程へ渡す Lean の理想形。数学：ロットサイズ N・工程数 k の場合、Batch の Throughput Time ≈ N × Σ(cycle time)、One-Piece は ≈ Σ(cycle) + (N−1) × max(cycle) — 工程数 k が増えるほど差が拡大。ただし One-Piece Flow の前提：SMED で段取り短縮、工程バランス（Takt time 同期）、低不良率。",
 example:"De Gouden Wafel：焼成→充填→冷却→包装 の4工程、各5分／個、ロット50個。Batch Flow なら 50×5×4=1000分（16.7時間）。1個流しに変更すると、最初の1個は4×5=20分、最後の1個は20+49×5=265分（4.4時間）。Throughput Time は約 1/4 に短縮。さらに Batch では1個目の不良は50個全部焼いた後に判明（手戻り50個）、1個流しなら即発見で手戻り1個のみ。",
 visual:"compare",
 cmpTable:[["軸","Batch","Continuous Flow"],
   ["移動単位","ロット","1個"],
   ["WIP","多","少"],
   ["Throughput Time","長","短"],
   ["不良発見","遅い","早い"]],
 compare:true,
 memorize:["1個流しがLeanの理想","Batchは段替コスト時に妥協","SMEDで Batch→Flow へ"],
 related:["w7_smed","w7_lean_wip","w2_long_thin"]},

{id:"w7_lean_3layer", w:7, ch:"Ch15", group:"Lean Basics", name:"Lean 3層フレーム",
 def:"哲学（顧客価値・改善）／技術（JIT・自働化・5S）／計画管理（Kanban・Heijunka）の3層。",

{id:"w7_smed", w:7, ch:"Ch15", group:"Lean Basics", name:"SMED — 段取り短縮 4手法",
 def:"Single-Minute Exchange of Dies（10分未満で金型交換）— Shigeo Shingo が Toyota で開発した段取り時間短縮の技法。Lean 実現の最重要技術。段取り時間が長いと EOQ（経済的発注量）が大きくなり大ロット生産＝在庫増・流れ阻害になる。SMED で段取り時間が劇的に短縮（典型的に 90%減）すると、小ロット生産が経済的になり、JIT・1個流しが可能になる。手法：①内段取り（機械停止中の作業）と外段取り（稼働中にできる作業）を区別、②内→外への変換、③両方の並列実行、④機構改善（クランプの簡素化、ワンタッチ化）。",
 example:"De Gouden Wafel のフレーバー切替（プレーン→抹茶）：旧来 30分（オーブン停止→金型交換→温度再調整→試焼き）。SMED 適用後：①次の抹茶生地・型を稼働中に外段取りで準備、②試焼き条件を事前計算で内→外へ移管、③2人で並列に金型交換と温度設定、④ワンタッチ式金型ロックに改造 → 7分に短縮。結果として EOQ が 500個→100個に減少、小ロット高頻度生産が可能に。",
 visual:"flow",
 flow:["①内/外段取り分離","②内→外変換","③並列化","④機構改善"],
 memorize:["4段階で短縮","Co低下→EOQ低下→Lean可能","Batch→Flow の鍵"],
 related:["w6_eoq","w7_batch_flow","w7_lean"]},

{id:"w7_red_queen", w:7, ch:"Ch15", group:"Lean Basics", name:"Red Queen Effect",
 def:"『鏡の国のアリス』の赤の女王の言葉『同じ場所にいるためには全力で走り続けなければならない』に由来する経営概念。市場での競争は相対的なので、競合が改善し続ける限り自社の改善が止まれば相対的に後退する。Lean を『一度導入したら終わり』ではなく『継続的改善（Kaizen）が文化として根付くべき』理由。Lean Strategy における Dynamic Capability の前提。",
 example:"De Gouden Wafel：競合 A社（Hema）も Lean 導入し年8%生産性改善中。自社が現状維持なら3年でコスト競争力で20%劣位に。だから毎年最低5%改善目標を全社で設定し、月次 Kaizen 会議で進捗チェック。改善が止まった瞬間、市場シェアの侵食が始まる。",
 memorize:["停滞=後退","継続的Kaizenが必要","Strategy の Dynamic capabilityと繋がる"],
 related:["w7_lean","w1_strategy"]},

{id:"w7_lean_house", w:7, ch:"Ch15", group:"Lean Basics", name:"Lean House — TPS構造",
 def:"Toyota Production System の全体構造を『家』のメタファーで表現したフレーム。屋根（目標）＝最高品質・最低コスト・最短LT。2本の柱＝JIT（流れ）と Jidoka（自働化＝異常時に自動停止して人を呼ぶ）。土台（基礎活動）＝Heijunka（生産平準化）・Standardized Work（標準作業）・Kaizen（継続改善）・5S。中心に『人尊重（Respect for People）』。柱だけ・土台だけ・屋根だけ導入は崩壊する。全要素揃って初めて機能するという思想。",
 example:"De Gouden Wafel の TPS House：屋根=『プレミアム品質×アムステルダム最低コスト×注文翌日配送』、柱1（JIT）=Kanban発注で在庫2日分、柱2（Jidoka）=オーブン温度センサー＆充填センサーで異常時自動停止→ベイカー呼出、土台=毎週月曜の Heijunka 生産計画＋標準作業書＋週次 Kaizen 会議＋毎日5S。これらが全部揃って初めて Toyota レベルの結果が出る。",
 visual:"flow",
 flow:["屋根：Q↑・C↓・LT↓","柱1：JIT","柱2：Jidoka（自働化）","土台：Heijunka / Standardized Work / Kaizen / 5S"],

{id:"w7_tpm", w:7, ch:"Ch16", group:"Lean Mgmt", name:"TPM — Total Productive Maintenance",
 def:"設備総合効率（OEE）を全員参加で改善。自主保全＋計画保全＋改善活動の3本柱。",

{id:"w7_5s", w:7, ch:"Ch15", group:"Lean Basics", name:"5S（職場の基礎）",
 def:"職場を整理・清潔・効率的に保つ5段階の活動。Lean House の土台にあり、ムダ排除・安全性・品質の前提条件。Toyota が体系化し全世界に広がった。",
 example:"De Gouden Wafel工場の5S：① Sort=不要な型抜きを廃棄、② Set in Order=道具を作業順に配置・形跡管理、③ Shine=毎終業時に清掃チェック、④ Standardize=色分け＆写真標識で誰がやっても同じ、⑤ Sustain=月次5S監査で習慣化。",
 memorize:["5つのS（日本語と英語の両方を覚える）","Lean Houseの土台部分","Visual Management（見える化）の前提","Sustain（習慣化）が一番難しい","欧米企業の Lean 導入失敗の8割が5Sでつまずく"],
 related:["w7_lean","w7_lean_house","w7_jit","w7_poka_yoke"]},

{id:"w7_3m", w:7, ch:"Ch15", group:"Lean Basics", name:"3M — Muda・Mura・Muri",
 def:"Toyota が定義した『排除すべき3つのM』。Muda（無駄）= 価値を生まない作業、Mura（ムラ）= 仕事量のばらつき、Muri（無理）= 人・設備への過負荷。Muda は最も有名だが、Mura と Muri が Muda を生む根本原因。",
 example:"De Gouden Wafel：Muda=売れない分の焼成（過剰生産）、Mura=月曜は閑古鳥・金曜は大忙し（需要平準化されず）、Muri=繁忙期に1人が3工程兼任で疲弊→不良率増。Mura・Muri を Heijunka（平準化）で抑える。",
 memorize:["3つの M（漢字とローマ字）","Muri と Mura が Muda を引き起こす（順番が重要）","対策：Heijunka（平準化生産）で Mura・Muri 解消 → Muda 削減","TIMWOOD は Muda の細分化","Toyota Way の根本"],
 related:["w7_lean","w7_lean_house"]},

{id:"w7_six_sigma", w:7, ch:"Ch16", group:"Improvement Methods", name:"Six Sigma & DMAIC",
 def:"統計的手法で品質ばらつきを徹底削減（6σ = 不良率 3.4 PPM）するMotorola発・GE普及の改善手法。DMAIC（Define・Measure・Analyze・Improve・Control）の5フェーズで進める。Lean とは別アプローチ（Lean=流れ・速さ重視、Six Sigma=ばらつき・統計重視）。",
 example:"De Gouden Wafel：ワッフル重量のばらつきが大きい問題。D=目標設定（30g±1g）、M=毎時5個サンプリング、A=温度との相関分析、I=オーブン温度自動制御導入、C=SPC で継続監視。不良率 0.5%→0.01% へ。",
 formula:"6σ ≈ 99.99966% 良品 = 3.4 PPM 不良<br>Cpk ≥ 2.0 が目標",
 memorize:["DMAIC の5段階","6σ の意味（標準偏差6個分の余裕）","役割：Champion / Master BB / Black Belt / Green Belt","Lean と組み合わせて Lean Six Sigma に","『データ駆動』の品質改善"],
 related:["w7_lean","w8_spc","w7_pdca","w7_improve_compare"]},

{id:"w7_pdca", w:7, ch:"Ch16", group:"Improvement Methods", name:"PDCA Cycle（Demingサイクル）",
 def:"Plan-Do-Check-Act の継続的改善サイクル。Deming が日本に持ち込み Toyota が現場で深化させた。すべての改善活動の基本フレーム。Kaizen の原理。",
 example:"De Gouden Wafelカフェ：P=待ち時間を5分→3分にする計画、D=2号店で先行試験（追加スタッフ配置）、C=2週間データで2.8分達成を確認、A=全店展開＆標準作業書改訂。次のサイクル開始。",
 visual:"flow",
 flow:["Plan（計画）","Do（実行）","Check（検証）","Act（標準化／次の改善）"],
 memorize:["P-D-C-A の4段階","螺旋的に上昇するサイクル（毎回少しずつ良くなる）","DMAIC・SDCA・OODA など派生多数","Check が省略されがち（だが最重要）","Sustain（持続化）= Act の本質"],
 related:["w7_lean","w7_six_sigma","w7_innovation_kaizen","w8_spc"]},

{id:"w7_toc", w:7, ch:"Ch16", group:"Improvement Methods", name:"Theory of Constraints（TOC）",
 def:"Goldratt の『制約理論』。システムのスループットはボトルネック（=制約）に支配されるので、制約に集中投資すべきという原理。5 Focusing Steps で進める。DBR（Drum-Buffer-Rope）はTOC の運用手法。",
 example:"De Gouden Wafel：焼成オーブン1台が制約 → ① Identify=焼成を特定、② Exploit=オーブン稼働率最大化（昼休み交代で休まず稼働）、③ Subordinate=他工程を焼成に同期、④ Elevate=オーブン2台目購入、⑤ Repeat=次は包装が新ボトルネック。",
 visual:"flow",
 flow:["① Identify the Constraint（制約を特定）","② Exploit the Constraint（制約を最大活用）","③ Subordinate Everything（他は制約に従属）","④ Elevate the Constraint（制約を上げる＝投資）","⑤ Repeat（次の制約へ）"],
 memorize:["5 Focusing Steps（5段階）","制約以外の改善はムダ（Goldratt の主張）","『The Goal』Goldratt 著","DBR は TOC の実装","Lean と相補的（Lean=流れ、TOC=制約集中）"],
 related:["w2_bottleneck","w3_dbr","w7_lean","w7_improve_compare"]},

{id:"w7_sandcone", w:7, ch:"Ch16", group:"Improvement Methods", name:"Sandcone Theory（砂山理論）",
 def:"パフォーマンス改善の優先順位を示すモデル：Quality → Dependability → Speed → Flexibility → Cost の順で積み上げる（下から）。下位を確立せず上を狙うと崩れる、砂山のように。Ferdows & De Meyer 1990。",
 example:"De Gouden Wafel：いきなり Cost 削減を狙うと品質崩壊。順序を守って、まず Quality（不良率0.1%）→ Dependability（納期遵守99%）→ Speed（リードタイム3日）→ Flexibility（限定品月替わり）→ 最後にCost 削減。結果として全部が改善され、コストも自然に下がる。",
 visual:"flow",
 flow:["底：Quality（品質）","↑ Dependability（信頼性）","↑ Speed（速さ）","↑ Flexibility（柔軟性）","頂上：Cost（コスト）"],
 memorize:["積み上げ順序：Q→D→S→F→C","下が崩れたら上も崩れる","Cost を直接狙わない（結果としてついてくる）","Performance Trade-offs に対する答え（長期的には全部改善可）","Lean 思想と一致"],
 related:["w1_quality","w1_speed","w1_depend","w1_flex","w1_cost","w1_tradeoff","w1_frontier"]},

{id:"w7_innovation_kaizen", w:7, ch:"Ch16", group:"Improvement Methods", name:"Breakthrough vs Continuous（Innovation vs Kaizen）",
 def:"改善には2タイプ：Breakthrough（一気の革新・大投資・低頻度）と Continuous（Kaizen＝日々の小改善・高頻度）。両方必要だが、文化が違う。日本企業＝Kaizen偏重、欧米＝Breakthrough偏重とも言われる。",
 example:"De Gouden Wafel：Breakthrough=自動充填ライン導入（€500K投資、生産性2倍）。Continuous=毎週の Kaizen ミーティングで作業者から改善提案を集める（1件€100だが年間500件で€50K効果）。両輪で回す。",
 visual:"compare",
 cmpTable:[["軸","Breakthrough","Continuous（Kaizen）"],
   ["性質","革新的・大規模","漸進的・小規模"],
   ["頻度","数年に1度","毎日・毎週"],
   ["主導","経営層・専門家","現場全員"],
   ["コスト","高額投資","ほぼゼロ"],
   ["リスク","失敗の影響大","小さく試せる"],
   ["代表","BPR・Six Sigma","Lean・QC Circle"]],
 compare:true,
 memorize:["2つの改善モード","Breakthrough = Innovation","Continuous = Kaizen（改善）","両輪が必要（一方だけだと停滞）","PDCAは両方に使える"],
 related:["w7_pdca","w7_red_queen","w7_improve_compare","w7_lean"]},

{id:"w7_improve_compare", w:7, ch:"Ch16", group:"Improvement Methods", name:"4つの改善アプローチ比較",
 def:"BPR（Business Process Re-engineering）・TQM（Total Quality Management）・Lean・Six Sigma の4つの改善アプローチ。それぞれ起源・焦点・手法が違うが、組み合わせて使うのが現代の主流。",

   ["Lean","Toyota 1950s","ムダ排除・流れ","継続的","JIT・5S・VSM"],
   ["Six Sigma","Motorola 1980s","ばらつき削減","プロジェクト型","DMAIC・統計"]],

{id:"w8_spc", w:8, ch:"Ch17", group:"Quality", name:"SPC & Control Charts",
 def:"工程を統計的に管理。X̄-R Chart で平均と範囲を監視。UCL/LCL=μ±3σ。",
 example:"De Gouden Wafelワッフル重量：目標30g、UCL=30.6, LCL=29.4。毎時5個サンプリング、平均が外れたら工程停止。",
 formula:"UCL = X̄̄ + A₂R̄<br>LCL = X̄̄ − A₂R̄<br>±3σ ≈ 99.73%（Common cause）",
 memorize:["Common cause vs Special cause","6σ=不良 3.4ppm","Cpk=工程能力指数（≥1.33 が目安）"],
 related:["w1_quality","w8_fmea","w8_6dim"]},

{id:"w8_fmea", w:8, ch:"Ch17", group:"Quality", name:"FMEA",
 def:"Failure Mode and Effects Analysis。RPN=Severity × Occurrence × Detection。RPN高い順に対策。",
 example:"De Gouden Wafel：『焼成温度センサー故障』S=8、O=4、D=3 → RPN=96 → 二重センサー化で D=1→ RPN=32。",
 formula:"RPN = S × O × D<br>各 1-10 スケール → 最大1000",
 memorize:["3要素 SOD","Severity 下げにくいので O・D を下げる","FTA は逆向き（結果→原因）"],
 related:["w8_fta","w8_poka_yoke","w8_risk3"]},

{id:"w8_coq", w:8, ch:"Ch17", group:"Quality", name:"Cost of Quality & Control Plan",
 def:"PAF model：Prevention＋Appraisal=投資、Internal＋External Failure=損失。総コスト最小点を狙う。",
 example:"De Gouden Wafel：予防（訓練・SMED）€20K、評価（検査）€15K、内部不良（廃棄）€8K、外部不良（クレーム）€5K → 総 €48K。",
 visual:"compare",

   ["Prevention","予防","訓練・FMEA"],
   ["Appraisal","検査","SPC・抜取検査"],
   ["Internal Failure","内部不良","焦げ品廃棄"],
   ["External Failure","外部不良","返品・クレーム"]],
 memorize:["PAF 4分類","予防コスト1$=Failureコスト10$削減","Lean=Prevention重視"],

{id:"w8_reliability", w:8, ch:"Ch17", group:"Quality", name:"Reliability: A, MTBF, λ",
 def:"Availability=A=MTBF/(MTBF+MTTR)。Failure rate λ=1/MTBF。",
 example:"De Gouden Wafelオーブン：MTBF=200時間、MTTR=2時間 → A=200/202=99%。",
 formula:"A = MTBF / (MTBF + MTTR)<br>λ = 1 / MTBF<br>R(t) = e^(−λt)",
 memorize:["MTBF=平均故障間隔、MTTR=平均修復時間","Aは%表示","次の System reliabilityへ"],
 related:["w8_sys_rel","w7_tpm","w1_depend"]},

{id:"w8_cpm", w:8, ch:"Ch18", group:"Project Mgmt", name:"Project Management & CPM",

{id:"w8_resist", w:8, ch:"Ch18", group:"Quality", name:"Resistance to Change & MacLeamy",

{id:"w8_fta", w:8, ch:"Ch18", group:"Quality", name:"Fault-Tree Analysis (FTA)",

{id:"w8_poka_yoke", w:8, ch:"Ch18", group:"Quality", name:"Poka-Yoke",

 example:"De Gouden Wafel：シロップ充填ノズルにセンサー→未充填箱は次工程に進まない。検査ではなくミス自体を防ぐ。",

{id:"w8_sys_rel", w:8, ch:"Ch18", group:"Quality", name:"System Reliability — Serial/Parallel",
 def:"直列=R_total=R₁×R₂×...（弱い）、並列=1−(1−R₁)(1−R₂)（冗長性で強化）。",

{id:"w8_crashing", w:8, ch:"Ch18", group:"Project Mgmt", name:"Crashing — Project短縮",
 def:"Critical Path 上の作業に追加資源投入でLT短縮。Cost slope=増分コスト/短縮日。一番安い作業から短縮。",

 formula:"Cost Slope = (Crash Cost − Normal Cost) / (Normal Time − Crash Time)<br>Critical Path 上で Slope 最小の作業から短縮",

 related:["w8_cpm","w3_sched"]},

/* ============================================================

   ============================================================ */
const root = document.getElementById('roadmap');

function matchQuery(c, q) {
  if (!q) return true;
  const qq = q.toLowerCase();
  return (c.name||'').toLowerCase().includes(qq)
      || (c.def||'').toLowerCase().includes(qq)
      || (c.example||'').toLowerCase().includes(qq);
}

function countConcepts(domain) {
  let n = 0;
  domain.subrooms.forEach(s => {
    if (s.concepts) n += s.concepts.length;
    if (s.subsub) s.subsub.forEach(ss => n += ss.concepts.length);
  });
  return n;
}

function getConcept(id) { return CONCEPTS.find(x => x.id === id); }
function openModalById(id) { openModal(getConcept(id)); }
function getName(id) { const c = getConcept(id); return c ? c.name.slice(0, 18) : id; }

/* Room → Area mapping (for area filter) */
const ROOM_AREAS = {
  r_define:"strategy", r_perf:"strategy", r_strategy:"strategy", r_csr:"strategy",
  r_network:"design", r_capdesign:"design", r_process:"design", r_throughput:"design", r_layout:"design",
  r_planbasic:"planning", r_schedule:"planning", r_control:"planning", r_orderstrat:"planning", r_capmgmt:"planning", r_queue:"planning",

};

/* ======== Simple tree render ======== */
function renderRoadmap(filter='all', query='') {
  let inner = '';
  HOUSE.forEach(domain => {
    if (filter !== 'all' && ROOM_AREAS[domain.id] !== filter) return;
    const tree = renderTree(domain, query);
    if (tree) inner += tree;
  });
  root.innerHTML = `<div class="rooms-grid">${inner}</div>`;
}

function renderTree(domain, query) {
  const color = domain.color;

  const leafBranch = c => {
    const hasParts = c.parts && c.parts.length > 0;
    const hasChildren = c.children && c.children.length > 0;

    if (!hasParts && !hasChildren) {
      return `<div class="branch"><span class="leaf" onclick="openModalById('${c.id}')">${c.name}</span></div>`;
    }

    // Render children (independent concepts) — recursive
    let childrenHtml = '';
    if (hasChildren) {
      childrenHtml = c.children
        .map(cid => getConcept(cid))
        .filter(cc => cc && matchQuery(cc, query))
        .map(cc => leafBranch(cc))
        .join('');
    }
    // Render parts (descriptive elements) as siblings of children
    let partsHtml = '';
    if (hasParts) {
      partsHtml = c.parts.map(p =>
        `<div class="branch"><span class="leaf part" onclick="openModalById('${c.id}')" title="${p.brief.replace(/"/g,'&quot;')}">${p.name}</span></div>`
      ).join('');
    }

    return `<div class="branch">
      <span class="leaf parent" onclick="openModalById('${c.id}')">${c.name}</span>
      <div class="branches">${childrenHtml}${partsHtml}</div>
    </div>`;
  };

  // Build sub-rooms as branches
  const subBranches = [];
  domain.subrooms.forEach(sub => {
    let innerBranches = '';
    if (sub.subsub) {
      const ssBranches = [];
      sub.subsub.forEach(ss => {
        const leaves = ss.concepts.map(getConcept).filter(c => c && matchQuery(c, query));
        if (leaves.length === 0) return;
        ssBranches.push(`<div class="branch">
          <span class="node subsub-node">${ss.title}</span>
          <div class="branches">${leaves.map(leafBranch).join('')}</div>
        </div>`);
      });
      if (ssBranches.length === 0) return;
      innerBranches = `<div class="branches">${ssBranches.join('')}</div>`;
    } else if (sub.concepts) {
      const leaves = sub.concepts.map(getConcept).filter(c => c && matchQuery(c, query));
      if (leaves.length === 0) return;
      innerBranches = `<div class="branches">${leaves.map(leafBranch).join('')}</div>`;
    }
    if (!innerBranches) return;
    subBranches.push(`<div class="branch">
      <span class="node sub-node">${sub.title}</span>
      ${innerBranches}
    </div>`);
  });

  if (subBranches.length === 0) return '';

  return `<div class="room" id="tree-${domain.id}" style="border-color:${color};">
    <div class="room-head">
      <span class="icn">${domain.icon}</span>
      <span class="nm" style="color:${color};">${domain.title.split('（')[0]}</span>
      <span class="jp">${domain.jp}</span>
    </div>
    <div class="branches" style="--line-color:${color};">
      ${subBranches.join('')}
    </div>
  </div>`;
}

   ============================================================ */
const modalBg = document.getElementById('modal-bg');
const modal = document.getElementById('modal');

/* find which room/sub-room a concept belongs to */
function findLocation(id) {
  for (const d of HOUSE) {
    for (const s of d.subrooms) {
      if (s.concepts && s.concepts.includes(id)) return {domain:d, sub:s, subsub:null};
      if (s.subsub) {
        for (const ss of s.subsub) {
          if (ss.concepts.includes(id)) return {domain:d, sub:s, subsub:ss};
        }
      }
    }
  }
  return null;
}

function openModal(c) {
  if (!c) return;
  const wColor = WEEK_COLORS[c.w] || '#4a7dd9';
  const loc = findLocation(c.id);
  const breadcrumb = loc ? `${loc.domain.icon} ${loc.domain.title.split('（')[0]} › ${loc.sub.icon} ${loc.sub.title}${loc.subsub?' › '+loc.subsub.title:''}` : '';
  let html = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${c.name}</div>
        <div class="modal-meta">
          <span style="background:${wColor};color:#fff;padding:2px 8px;border-radius:4px;">Week ${c.w}</span>
          ${c.ch}
        </div>
        <div style="font-size:11px;color:#8aa0c4;margin-top:6px;">📍 ${breadcrumb}</div>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <h3>📖 意味</h3>
        <p>${c.def || ''}</p>
      </div>

      <div class="modal-section">
        <h3>🥞 De Gouden Wafel での例</h3>
        <div class="example-box">${c.example || ''}</div>
      </div>
  `;

  if (c.parts && c.parts.length) {
    html += `
      <div class="modal-section">
        <h3>🔸 構成要素（各論）</h3>
        <ul class="parts-list">
          ${c.parts.map(p => `<li><b>${p.name}</b> — ${p.brief}</li>`).join('')}
        </ul>
      </div>
    `;
  }

  if (c.formula) {
    html += `
      <div class="modal-section">
        <h3>ƒ 公式・計算</h3>
        <div class="formula-box">${c.formula}</div>
      </div>
    `;
  }

  if (c.visual === 'flow' && c.flow) {
    html += `
      <div class="modal-section">
        <h3>🔀 フロー / 構造</h3>
        <div class="mini-flow">
          ${c.flow.map((n,i) => `<div class="node">${n}</div>${i<c.flow.length-1?'<span class="arrow">→</span>':''}`).join('')}
        </div>
      </div>
    `;
  }

  if (c.cmpTable) {
    html += `
      <div class="modal-section">
        <h3>⇄ 比較表</h3>
        <table class="compare-table">
          <tr>${c.cmpTable[0].map(h=>`<th>${h}</th>`).join('')}</tr>
          ${c.cmpTable.slice(1).map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}
        </table>
      </div>
    `;
  }

  if (c.memorize && c.memorize.length) {
    html += `
      <div class="modal-section">
        <h3>🎯 覚えるべきポイント</h3>
        <div class="memo-box">
          <ul>${c.memorize.map(m=>`<li>${m}</li>`).join('')}</ul>
        </div>
      </div>
    `;
  }

  if (c.related && c.related.length) {
    // Group related concepts by domain to show cross-room connections
    const byDomain = {};
    c.related.forEach(r => {
      const t = getConcept(r);
      if (!t) return;
      const l = findLocation(r);
      const dKey = l ? l.domain.id : 'other';
      if (!byDomain[dKey]) byDomain[dKey] = {domain:l ? l.domain : null, items:[]};
      byDomain[dKey].items.push({c:t, loc:l});
    });
    const ownDom = loc ? loc.domain.id : null;
    let relatedHtml = '';
    Object.values(byDomain).forEach(grp => {
      const d = grp.domain;
      const isSameRoom = d && d.id === ownDom;
      const label = d ? `${d.icon} ${d.title.split('（')[0]} ${isSameRoom?'（同じ部屋内）':'（別の部屋へ）'}` : 'その他';
      relatedHtml += `<div style="margin-bottom:10px;">
        <div style="font-size:11px;color:${d?d.color:'#8aa0c4'};margin-bottom:4px;font-weight:600;">${label}</div>
        <div class="related-row">
          ${grp.items.map(({c:t})=>`<span class="related-chip" onclick="jumpTo('${t.id}')">W${t.w} ・ ${t.name}</span>`).join('')}
        </div>
      </div>`;
    });
    html += `
      <div class="modal-section">
        <h3>🔗 繋がっている概念（部屋を越えて）</h3>
        ${relatedHtml}
      </div>
    `;
  }

  html += `</div>`;
  modal.innerHTML = html;
  modalBg.classList.add('show');
}

function closeModal() {
  modalBg.classList.remove('show');
}

function jumpTo(id) {
  const c = CONCEPTS.find(x => x.id === id);
  if (c) openModal(c);
}

modalBg.onclick = (e) => { if (e.target === modalBg) closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
